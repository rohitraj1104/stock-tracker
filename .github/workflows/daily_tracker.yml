name: Daily Stock Tracker

on:
  schedule:
    # Runs every weekday at 9:00 AM EST (14:00 UTC)
    - cron: "0 14 * * 1-5"

  # Allows you to run this manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  update-stocks:
    runs-on: ubuntu-latest

    # Give the action permission to write back to your repo
    permissions:
      contents: write

    steps:
      # Step 1: Check out your repository
      - name: Checkout repository
        uses: actions/checkout@v5

      # Step 2: Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # Step 3: Install required Python libraries
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pandas lxml

      # Step 4: Run the scraper
      - name: Run stock tracker
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          python scripts/update_table.py

      # Step 5: Commit and push the updated CSV back to the repo
      - name: Commit updated data
        run: |
          git config --global user.name  "Stock Tracker Bot"
          git config --global user.email "bot@github-actions"
          git add data/stocks.csv
          git diff --cached --quiet || git commit -m "📈 Daily update: $(date +'%Y-%m-%d')"
          git push
